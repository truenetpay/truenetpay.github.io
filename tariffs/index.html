<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrueNET — Тарифы</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: url("/bg.png") no-repeat center center fixed;
    background-size: cover;
    color: white;
}

body::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.55);
}

.container {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 420px;
    margin: auto;
    padding: 20px;
    text-align: center;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(25px);
    border-radius: 20px;
    padding: 20px;
    margin-top: 15px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.6);
}

/* PLAN */
.plan {
    margin-top: 10px;
    padding: 14px;
    border-radius: 12px;
    background: rgba(255,255,255,0.08);
    cursor: pointer;
    transition: 0.2s;
}

.plan:hover {
    background: rgba(255,255,255,0.15);
}

.plan.active {
    background: linear-gradient(90deg, #3b82f6, #2563eb);
}

/* RECOMMENDED */
.recommended {
    font-size: 11px;
    color: #93c5fd;
}

/* PRICE */
.price {
    font-size: 18px;
    margin-top: 5px;
}

/* BUTTON */
.btn {
    width: 100%;
    margin-top: 15px;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(90deg, #3b82f6, #2563eb);
    color: white;
    font-size: 16px;
    cursor: pointer;
}

/* TG */
.tg {
    margin-top: 15px;
    font-size: 13px;
    color: #cbd5f5;
}

.tg a {
    color: #93c5fd;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<b>Базовый сервер</b><br><br>

1 vCPU • 1GB RAM • 10GB NVMe<br>
1 IPv4 • 500 Mbit/s<br><br>

<span style="color:#93c5fd">
Подходит для 10–20 активных пользователей без потери скорости
</span>

</div>

<div class="card">

<b>Выбор срока</b>

<div class="plan" onclick="selectPlan(this,2700)">
1 месяц
<div class="price">2700 ₽</div>
</div>

<div class="plan active" onclick="selectPlan(this,3200)">
<div class="recommended">рекомендуем</div>
3 месяца
<div class="price">3200 ₽</div>
</div>

<div class="plan" onclick="selectPlan(this,3800)">
6 месяцев
<div class="price">3800 ₽</div>
</div>

<div class="plan" onclick="selectPlan(this,5000)">
12 месяцев
<div class="price">5000 ₽</div>
</div>

<div class="plan" onclick="selectPlan(this,7000)">
24 месяца
<div class="price">7000 ₽</div>
</div>

<button class="btn" onclick="createOrder()">
Перейти к оплате — <span id="priceLabel">3200 ₽</span>
</button>

</div>

<div class="card">

Индивидуальная настройка<br><br>

<button class="btn" onclick="goTG()">
Обсудить в Telegram
</button>

<div class="tg">
или написать: <a href="https://t.me/truenet_support">@truenet_support</a>
</div>

</div>

</div>

<script>
let price = 3200;

function selectPlan(el, p){
  document.querySelectorAll('.plan').forEach(e => e.classList.remove('active'));
  el.classList.add('active');

  price = p;
  document.getElementById("priceLabel").innerText = p + " ₽";
}

async function createOrder(){

  const res = await fetch("https://your-proxy.onrender.com/create", {
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body: JSON.stringify({
      price: price,
      ttl: 3600
    })
  });

  const data = await res.json();

  window.location.href = data.link;
}

function goTG(){
  window.location.href = "https://t.me/truenet_support";
}
</script>

</body>
</html>
