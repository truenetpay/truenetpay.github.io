<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrueNET</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">

<!-- Yandex Metrika -->
<script type="text/javascript">
(function(m,e,t,r,i,k,a){
m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};
m[i].l=1*new Date();
k=e.createElement(t),a=e.getElementsByTagName(t)[0];
k.async=1;k.src=r;a.parentNode.insertBefore(k,a)
})
(window, document, "script", "https://mc.yandex.ru/metrika/tag.js", "ym");

ym(XXXXXXXX, "init", {
  clickmap:true,
  trackLinks:true,
  accurateTrackBounce:true
});
</script>
<noscript><div><img src="https://mc.yandex.ru/watch/XXXXXXXX" style="position:absolute; left:-9999px;" alt="" /></div></noscript>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(180deg, #0b1d3a, #142a52);
  color: white;
  text-align: center;
}
.container { max-width: 1100px; margin:auto; padding:20px; }
.logo { width:70px; margin-top:20px; }
h1 { font-size:42px; }
.subtitle { color:#cbd5e1; }
.btn {
  margin-top:20px;
  padding:15px 25px;
  background:#2563eb;
  border-radius:12px;
  border:none;
  color:white;
  font-size:18px;
  cursor:pointer;
}
.features { margin-top:30px; }
.price { margin-top:20px; font-size:26px; }
</style>

</head>
<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>Не массовый сервис.<br>Персональный канал доступа.</h1>

<div class="subtitle">
Если привычные сервисы работают нестабильно
</div>

<button class="btn" onclick="goToOrder()">
Получить свой сервер
</button>

<div class="features">
✔ только ваш трафик<br>
✔ стабильная скорость<br>
✔ без перегрузок<br>
✔ быстрая настройка
</div>

<div class="price">от 2700 ₽</div>

</div>

<script>
async function goToOrder() {

  // 🔥 событие клика
  ym(XXXXXXXX, 'reachGoal', 'click_button');

  const res = await fetch("https://your-proxy.onrender.com/create", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": "YOUR_ADMIN_KEY"
    },
    body: JSON.stringify({
      price: 2700,
      ttl: 3600
    })
  });

  const data = await res.json();

  // 🔥 заказ создан
  ym(XXXXXXXX, 'reachGoal', 'order_created');

  // 🔥 переход на оплату
  ym(XXXXXXXX, 'reachGoal', 'redirect_to_payment');

  window.location.href = data.link;
}
</script>

</body>
</html>
