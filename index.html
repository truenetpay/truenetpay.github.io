<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrueNET</title>
<link rel="icon" href="/favicon.svg">

<!-- Yandex Metrika -->
<script type="text/javascript">
(function(m,e,t,r,i,k,a){
m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};
m[i].l=1*new Date();
k=e.createElement(t),a=e.getElementsByTagName(t)[0];
k.async=1;k.src=r;a.parentNode.insertBefore(k,a)
})
(window, document, "script", "https://mc.yandex.ru/metrika/tag.js", "ym");

ym(XXXXXXXX, "init", {
  clickmap:true,
  trackLinks:true,
  accurateTrackBounce:true
});
</script>
<noscript><div><img src="https://mc.yandex.ru/watch/XXXXXXXX" style="position:absolute; left:-9999px;" /></div></noscript>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: url("/bg.png") no-repeat center/cover fixed;
  color: white;
}

/* ===== HEADER ===== */
.header {
  position: absolute;
  top: 0;
  width: 100%;
  padding: 20px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo {
  width: 40px;
}

.brand {
  font-size: 22px;
  font-weight: 600;
}

.nav {
  font-size: 14px;
  color: #cbd5e1;
}

/* ===== HERO ===== */
.hero {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 100vh;
  padding: 0 60px;
}

/* LEFT */
.left {
  max-width: 520px;
}

h1 {
  font-size: 48px;
  line-height: 1.2;
  margin-bottom: 15px;
}

.subtitle {
  color: #cbd5e1;
  margin-bottom: 25px;
}

.btn {
  padding: 14px 28px;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  background: linear-gradient(90deg, #2563eb, #3b82f6);
  color: white;
  transition: 0.2s;
}

.btn:hover {
  transform: scale(1.05);
}

/* FEATURES */
.features {
  margin-top: 25px;
  font-size: 16px;
}

.features div {
  margin: 8px 0;
}

/* PRICE */
.price {
  margin-top: 25px;
  font-size: 28px;
  font-weight: bold;
}

.price span {
  font-size: 14px;
  color: #cbd5e1;
  font-weight: normal;
}

/* RIGHT IMAGE */
.right img {
  width: 480px;
}

/* ===== MOBILE ===== */
@media (max-width: 768px) {

  .hero {
    flex-direction: column;
    justify-content: center;
    text-align: center;
    padding: 20px;
  }

  h1 {
    font-size: 32px;
  }

  .right img {
    width: 220px;
    margin-top: 20px;
  }

  .header {
    padding: 15px;
  }

}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo-wrap">
    <img src="/logo.png" class="logo">
    <div class="brand">TrueNET</div>
  </div>
  <div class="nav">
    Главная &nbsp;&nbsp; О нас &nbsp;&nbsp; Тарифы
  </div>
</div>

<!-- HERO -->
<div class="hero">

  <!-- LEFT -->
  <div class="left">

    <h1>
      Не массовый сервис.<br>
      Персональный канал доступа.
    </h1>

    <div class="subtitle">
      Если привычные сервисы работают нестабильно
    </div>

    <button class="btn" onclick="goToOrder()">
      Получить свой сервер
    </button>

    <div class="features">
      <div>✔ только ваш трафик</div>
      <div>✔ стабильная скорость</div>
      <div>✔ без перегрузок</div>
      <div>✔ настройка 5–10 минут</div>
    </div>

    <div class="price">
      от 2700 ₽ <span>(включая первый месяц)</span>
    </div>

  </div>

  <!-- RIGHT -->
  <div class="right">
    <img src="/shield.png">
  </div>

</div>

<script>
async function goToOrder() {

  ym(XXXXXXXX, 'reachGoal', 'click_button');

  const res = await fetch("https://your-proxy.onrender.com/create", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": "YOUR_ADMIN_KEY"
    },
    body: JSON.stringify({
      price: 2700,
      ttl: 3600
    })
  });

  const data = await res.json();

  ym(XXXXXXXX, 'reachGoal', 'order_created');
  ym(XXXXXXXX, 'reachGoal', 'redirect_to_payment');

  window.location.href = data.link;
}
</script>

</body>
</html>
